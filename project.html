<!DOCTYPE html>
<html>
<head>
    <title>Cloud Storage Using AWS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            text-align: center;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }

        .message {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Cloud Storage Using AWS</h1>

        <p>Select a file to upload</p>

        <input type="file" id="fileInput">
        <br>
        <button onclick="uploadFile()">Upload</button>

        <div class="message" id="message"></div>
    </div>

    <script>
        function uploadFile() {
            const file = document.getElementById("fileInput").files[0];
            const message = document.getElementById("message");

            if (!file) {
                message.innerHTML = "Please select a file!";
                message.style.color = "yellow";
                return;
            }

            // Simulation of upload
            message.innerHTML = "Uploading " + file.name + " to AWS Cloud...";
            message.style.color = "lightgreen";

            setTimeout(() => {
                message.innerHTML = "File uploaded successfully to AWS S3 (Simulation)!";
            }, 2000);
        }
    </script>

</body>
</html>
